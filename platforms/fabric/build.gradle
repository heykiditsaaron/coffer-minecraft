plugins {
    id 'java-library'
    id 'fabric-loom' version "${loom_version}"
}

dependencies {
    minecraft "com.mojang:minecraft:${minecraft_version}"
    mappings "net.fabricmc:yarn:${yarn_mappings}:v2"

    implementation project(path: ':bindings:inventory', configuration: 'namedElements')
    implementation 'dev.coffer:coffer-core:1.0.0'
    implementation 'dev.coffer:coffer-runtime:1.0.0'
    implementation 'dev.coffer:coffer-transferable-value-authority:1.0.0'

    modImplementation "net.fabricmc.fabric-api:fabric-api:${fabric_api_version}"
    compileOnly "net.fabricmc:fabric-loader:${fabric_loader_version}"
}
